version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: database-blog
    ports:
      - "5436:5432"
    networks:
      - api

  backend:
    build: .
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - api

networks:
  api:
    driver: bridge
